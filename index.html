<!DOCTYPE html>
<html lang="ko">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최애 앨범 소개</title>
    <link rel = "stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }

        body {  padding: 20px; }

    </style>
</head>
<body>
    <header id="album-header">
      <div>  <p class="artist-name">five-billion</p> </div>
         <h1>EP 1집 'Antipue'</h1>
        <p class="subtitle">basic,slowly</p>
    </header>

    <section class="lyrics-section">
        <h2>🎵 킬링 파트 가사</h2>
        <div class="lyrics-box">
            <p>어릴적 넓게만 보이던</p>
            <p>좁은 골목 길에</p>
        </div>
    </section>
<div>
    <section class="info-section">
        <h2>✨ 입덕 포인트</h2>
        <ul id="charm-list">
            <li>옛 멜로디 그러나 세련된 느낌</li>
            <li>음악속에 묻어있는 한 폭의 추억들</li>
            <li>많은 생각을 해볼 기회를 주는 가사</li>
        </ul>
    </section>

    <section class="track-section">
        <h2>🎧 추천 플레이리스트</h2>
        <table id="track-table">
            <thead>
                <tr>
                    <th>Track</th>
                    <th>곡명</th>
                    <th>Play Time</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>01</td>
                    <td>혜화동</td>
                    <td>2:58</td>
                </tr>
                <tr>
                    <td>02</td>
                    <td>밤이 깊었네</td>
                    <td>2:45</td>
                </tr>
                <tr>
                    <td>03</td>
                    <td>사건의 지평선</td>
                    <td>3:02</td>
                </tr>
                <tr>
                    <td>04</td>
                    <td>야경</td>
                    <td>3:27</td>
                </tr>
                <tr>
                    <td>05</td>
                    <td>습관</td>
                    <td>2:57</td>
                </tr>
                <tr>
                    <td>06</td>
                    <td>Everything</td>
                    <td>3:26</td>
                </tr>
            </tbody>
        </table>
    </section>

    <footer id="album-footer">
        <button class="listen-btn">전곡 스밍하러 가기</button>
    </footer>
    </div>
</body>
</html>
